services:
  db:
    image: postgres:18.4
    container_name: chess_overwolf-db
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${PG_DATABASE}
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
    healthcheck:
      test: [ CMD-SHELL, pg_isready -h db ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    container_name: chess_overwolf-web
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    expose:
      - ${GO_PORT}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  redis:
    image: redis
    container_name: chess_overwolf-redis
    expose:
      - '6379'
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ CMD, redis-cli, ping ]
      interval: 5s
      timeout: 30s
      retries: 50

  migration:
    image: migrate/migrate
    container_name: chess_overwolf-migration
    volumes:
      - ./migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://${PG_USER}:${PG_PASSWORD}@db:5432/${PG_DATABASE}?sslmode=disable",
      "up"
    ]
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: chess_overwolf-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  redis_data:
  db_data:
  caddy_data:
  caddy_config: